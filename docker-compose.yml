# =============================================================================
# Environnement local Worimo : MinIO émule Cloudflare R2 (même API S3),
# le worker d'encodage tourne comme en production.
# Prérequis : `supabase start` déjà lancé (la base tourne sur l'hôte).
#
#   docker compose up -d --build
# =============================================================================
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3 (URLs présignées + lecture publique)
      - "9001:9001"   # Console web (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: worimo-local
      MINIO_ROOT_PASSWORD: worimo-local-secret
    volumes:
      - ./.minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Crée les buckets au démarrage : staging (privé) + public (lecture anonyme,
  # comme le domaine public R2 en production).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 worimo-local worimo-local-secret &&
        mc mb --ignore-existing local/worimo-staging &&
        mc mb --ignore-existing local/worimo-public &&
        mc anonymous set download local/worimo-public &&
        echo 'Buckets Worimo prêts.'
      "

  encoder:
    build: ./services/encoder
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      # Supabase local tourne sur l'hôte (supabase start).
      SUPABASE_URL: http://host.docker.internal:56321
      # Clé service_role locale : voir `supabase status`. Surchargez via
      # un fichier .env à la racine si elle diffère.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Définir SUPABASE_SERVICE_ROLE_KEY (voir `supabase status`)}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: worimo-local
      S3_SECRET_ACCESS_KEY: worimo-local-secret
      STAGING_BUCKET: worimo-staging
      PUBLIC_BUCKET: worimo-public
      # URL vue par le NAVIGATEUR (port MinIO mappé sur l'hôte).
      PUBLIC_BASE_URL: http://localhost:9000/worimo-public
      POLL_INTERVAL_MS: "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
