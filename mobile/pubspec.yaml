name: worimo
description: "Worimo — marketplace immobilière du Sénégal (feed vidéo + vérification foncière)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend : auth, PostgREST (RLS), Edge Functions
  supabase_flutter: ^2.8.0

  # Lecture HLS adaptative (feed vidéo + détail)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Upload direct vers l'URL présignée
  http: ^1.2.2

  # UI / plateforme
  google_fonts: ^6.2.1
  provider: ^6.1.2
  url_launcher: ^6.3.1
  intl: ^0.20.2

  # Publication : sélection vidéo/photos
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
